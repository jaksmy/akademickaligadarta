<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Ligi Darta - Logowanie</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 450px; margin: 30px auto; padding: 20px; background-color: #121212; color: #fff; }
        .box { border: 1px solid #333; padding: 25px; border-radius: 12px; background: #1e1e1e; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        h2, h3 { text-align: center; color: #1a73e8; margin-top: 0; }
        label { font-size: 14px; color: #ccc; margin-top: 10px; display: block; }
        input, button { width: 100%; padding: 12px; margin: 8px 0 16px 0; border-radius: 6px; border: 1px solid #444; background: #2a2a2a; color: #fff; font-size: 15px; }
        input:focus { border-color: #1a73e8; outline: none; }
        button { background: #1a73e8; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #1557b0; }
        .btn-secondary { background: #444; }
        .btn-secondary:hover { background: #555; }
        .hidden { display: none; }
        .error { color: #ff6b6b; font-size: 14px; text-align: center; margin-top: 10px; word-break: break-word; }
        .success { color: #51cf66; font-size: 14px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

    <h2>🎯 Panel Ligi Darta</h2>

    <!-- SEKCJA LOGOWANIA / REJESTRACJI -->
    <div id="auth-section" class="box">
        <h3>Zaloguj się / Zarejestruj</h3>
        
        <label for="email">E-mail:</label>
        <input type="email" id="email" placeholder="twoj@email.com">
        
        <label for="password">Hasło (min. 6 znaków):</label>
        <input type="password" id="password" placeholder="••••••••">
        
        <button id="btn-login">Zaloguj się</button>
        <button id="btn-register" class="btn-secondary">Załóż nowe konto</button>
        
        <p id="auth-msg" class="error"></p>
    </div>

    <!-- SEKCJA WYNIKÓW (Po zalogowaniu) -->
    <div id="app-section" class="box hidden">
        <p style="text-align: center;">Zalogowano jako:<br><strong id="user-email" style="color:#1a73e8;"></strong></p>
        <button id="btn-logout" class="btn-secondary" style="margin-bottom: 20px;">Wyloguj się</button>
        
        <hr style="border-color: #333;">
        <h3>Dodaj wynik meczu</h3>
        
        <label for="player1">Gracz 1:</label>
        <input type="text" id="player1" placeholder="np. Jan Kowalski">
        
        <label for="score1">Legi Gracza 1:</label>
        <input type="number" id="score1" value="0" min="0">

        <label for="player2">Gracz 2:</label>
        <input type="text" id="player2" placeholder="np. Piotr Nowak">

        <label for="score2">Legi Gracza 2:</label>
        <input type="number" id="score2" value="0" min="0">

        <button id="btn-save">Zapisz wynik meczu</button>
        <p id="save-msg"></p>
    </div>

    <!-- LOGIKA FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            onAuthStateChanged, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ⚠️ TUTAJ MUSISZ WKLEIĆ SWOJE KLUCZE Z FIREBASE CONSOLE! ⚠️
       // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBhCLFBrAqMBqKjPOIc5b0i2EEtZ_WP4M0",
  authDomain: "akademicka-liga-darta.firebaseapp.com",
  databaseURL: "https://akademicka-liga-darta-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "akademicka-liga-darta",
  storageBucket: "akademicka-liga-darta.firebasestorage.app",
  messagingSenderId: "832284758287",
  appId: "1:832284758287:web:1a156fb2cf197634aa6e7a",
  measurementId: "G-LN9B7YDB6K"
};
        };

        // Inicjalizacja
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Elementy HTML
        const authSection = document.getElementById('auth-section');
        const appSection = document.getElementById('app-section');
        const authMsg = document.getElementById('auth-msg');
        const saveMsg = document.getElementById('save-msg');

        // REJESTRACJA
        document.getElementById('btn-register').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            authMsg.textContent = "";

            if(!email || !pass) {
                authMsg.textContent = "Wpisz e-mail i hasło!";
                return;
            }

            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                authMsg.className = "success";
                authMsg.textContent = "✔ Konto utworzone! Ładowanie...";
            } catch (err) {
                authMsg.className = "error";
                if(err.code === 'auth/weak-password') {
                    authMsg.textContent = "Hasło musi mieć co najmniej 6 znaków!";
                } else if(err.code === 'auth/email-already-in-use') {
                    authMsg.textContent = "Ten e-mail jest już zarejestrowany. Kliknij Zaloguj.";
                } else {
                    authMsg.textContent = "Błąd: " + err.message;
                }
            }
        });

        // LOGOWANIE
        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            authMsg.textContent = "";

            if(!email || !pass) {
                authMsg.textContent = "Wpisz e-mail i hasło!";
                return;
            }

            try {
                await signInWithEmailAndPassword(auth, email, pass);
            } catch (err) {
                authMsg.className = "error";
                authMsg.textContent = "Błąd logowania: Błędny e-mail lub hasło.";
            }
        });

        // WYLOGOWANIE
        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // AUTOMATYCZNE WYKRYWANIE ZALOGOWANIA
        onAuthStateChanged(auth, (user) => {
            if (user) {
                authSection.classList.add('hidden');
                appSection.classList.remove('hidden');
                document.getElementById('user-email').textContent = user.email;
            } else {
                authSection.classList.remove('hidden');
                appSection.classList.add('hidden');
            }
        });

        // ZAPIS WYNIKU
        document.getElementById('btn-save').addEventListener('click', async () => {
            const p1 = document.getElementById('player1').value.trim();
            const s1 = parseInt(document.getElementById('score1').value);
            const p2 = document.getElementById('player2').value.trim();
            const s2 = parseInt(document.getElementById('score2').value);

            if(!p1 || !p2) {
                saveMsg.className = "error";
                saveMsg.textContent = "Wpisz nazwisko obu graczy!";
                return;
            }

            saveMsg.className = "success";
            saveMsg.textContent = "Zapisywanie w bazie...";

            try {
                await addDoc(collection(db, "matches"), {
                    player1: p1,
                    score1: s1,
                    player2: p2,
                    score2: s2,
                    addedBy: auth.currentUser.email,
                    createdAt: serverTimestamp()
                });

                saveMsg.className = "success";
                saveMsg.textContent = "✔ Wynik meczu został zapisany!";
                document.getElementById('player1').value = '';
                document.getElementById('player2').value = '';
                document.getElementById('score1').value = 0;
                document.getElementById('score2').value = 0;
            } catch (err) {
                saveMsg.className = "error";
                saveMsg.textContent = "Błąd zapisu: " + err.message;
            }
        });
    </script>
</body>
</html>
