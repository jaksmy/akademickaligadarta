<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Ligi Darta</title>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 40px auto; padding: 20px; background: #121212; color: #fff; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        input, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-sec { background: #444; }
        .hidden { display: none; }
        #msg { margin-top: 15px; font-weight: bold; text-align: center; word-break: break-all; }
    </style>
</head>
<body>

    <div id="auth-box" class="box">
        <h2>🎯 Panel Ligi Darta</h2>
        <input type="email" id="email" placeholder="Twój e-mail">
        <input type="password" id="password" placeholder="Hasło (min. 6 znaków)">
        
        <button id="btn-login" type="button">ZALOGUJ SIĘ</button>
        <button id="btn-register" type="button" class="btn-sec">ZAREJESTRUJ SIĘ</button>
        
        <div id="msg"></div>
    </div>

    <div id="app-box" class="box hidden">
        <h3>Witaj w panelu!</h3>
        <p>Zalogowano jako: <b id="user-email"></b></p>
        <button id="btn-logout" class="btn-sec">Wyloguj się</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            onAuthStateChanged, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ⬇️ Wklej tu swoje klucze z Firebase (zostaw cudzysłowy!)
        const firebaseConfig = {
            apiKey: "AIzaSyBhCLFBrAqMBqKjPOIc5b0i2EEtZ_WP4M0",
            authDomain: "akademicka-liga-darta.firebaseapp.com",
            projectId: "akademicka-liga-darta",
            storageBucket: "akademicka-liga-darta.firebasestorage.app",
            messagingSenderId: "832284758287",
            appId: "1:832284758287:web:1a156fb2cf197634aa6e7a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const msg = document.getElementById('msg');

        // Rejestracja
        document.getElementById('btn-register').onclick = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            msg.style.color = "yellow";
            msg.innerText = "Łączenie z bazą...";

            try {
                await createUserWithEmailAndPassword(auth, e, p);
                msg.style.color = "lime";
                msg.innerText = "✔ Konto utworzone!";
            } catch (err) {
                msg.style.color = "red";
                msg.innerText = "Błąd: " + err.message;
            }
        };

        // Logowanie
        document.getElementById('btn-login').onclick = async () => {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            msg.style.color = "yellow";
            msg.innerText = "Logowanie...";

            try {
                await signInWithEmailAndPassword(auth, e, p);
            } catch (err) {
                msg.style.color = "red";
                msg.innerText = "Błąd: " + err.message;
            }
        };

        // Wylogowanie
        document.getElementById('btn-logout').onclick = () => signOut(auth);

        // Stan zalogowania
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-box').classList.add('hidden');
                document.getElementById('app-box').classList.remove('hidden');
                document.getElementById('user-email').innerText = user.email;
            } else {
                document.getElementById('auth-box').classList.remove('hidden');
                document.getElementById('app-box').classList.add('hidden');
            }
        });
    </script>
</body>
</html>
