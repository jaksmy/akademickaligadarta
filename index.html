<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Ligi Darta - Wprowadzanie Wyników</title>
    <style>
        body { font-family: sans-serif; max-width: 500px; margin: 20px auto; padding: 15px; }
        .box { border: 1px solid #ccc; padding: 20px; border-radius: 10px; margin-bottom: 20px; background: #f9f9f9; }
        input, button, select { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        button:hover { background: #0056b3; }
        .hidden { display: none; }
        .error { color: red; font-size: 14px; }
        .success { color: green; font-size: 14px; }
    </style>
</head>
<body>

    <h2>🎯 Panel Ligi Darta</h2>

    <!-- SEKCJA 1: LOGOWANIE -->
    <div id="auth-section" class="box">
        <h3>Zaloguj się jako Sędzia / Admin</h3>
        <input type="email" id="email" placeholder="Twój e-mail">
        <input type="password" id="password" placeholder="Hasło">
        <button id="btn-login">Zaloguj się</button>
        <button id="btn-register" style="background:#6c757d;">Załóż konto</button>
        <p id="auth-msg" class="error"></p>
    </div>

    <!-- SEKCJA 2: FORMULARZ WYNIKÓW (Widoczny tylko po zalogowaniu) -->
    <div id="app-section" class="box hidden">
        <p>Zalogowano jako: <strong id="user-email"></strong> 
           (<a href="#" id="btn-logout" style="color:red;">Wyloguj</a>)</p>
        
        <hr>
        <h3>Dodaj wynik meczu</h3>
        
        <label>Gracz 1:</label>
        <input type="text" id="player1" placeholder="np. Michał NIEZNAŃSKI">
        
        <label>Wynik Gracza 1 (Legi):</label>
        <input type="number" id="score1" value="0" min="0">

        <label>Gracz 2:</label>
        <input type="text" id="player2" placeholder="np. Kacper MICHALEWSKI">

        <label>Wynik Gracza 2 (Legi):</label>
        <input type="number" id="score2" value="0" min="0">

        <button id="btn-save">Zapisz mecz w bazie</button>
        <p id="save-msg"></p>
    </div>

    <!-- SKRYPTY FIREBASE (wersja Modular SDK) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            onAuthStateChanged, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. TUTAJ WKLEJ SWOJE DANE Z KONSOLI FIREBASE
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBhCLFBrAqMBqKjPOIc5b0i2EEtZ_WP4M0",
  authDomain: "akademicka-liga-darta.firebaseapp.com",
  databaseURL: "https://akademicka-liga-darta-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "akademicka-liga-darta",
  storageBucket: "akademicka-liga-darta.firebasestorage.app",
  messagingSenderId: "832284758287",
  appId: "1:832284758287:web:1a156fb2cf197634aa6e7a",
  measurementId: "G-LN9B7YDB6K"
};
        };

        // Inicjalizacja usług
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Elementy interfejsu
        const authSection = document.getElementById('auth-section');
        const appSection = document.getElementById('app-section');
        const authMsg = document.getElementById('auth-msg');
        const saveMsg = document.getElementById('save-msg');

        // --- OBSŁUGA REJESTRACJI I LOGOWANIA ---
        document.getElementById('btn-register').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await createUserWithEmailAndPassword(auth, email, pass);
                authMsg.textContent = "";
            } catch (err) {
                authMsg.textContent = "Błąd rejestracji: " + err.message;
            }
        });

        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pass);
                authMsg.textContent = "";
            } catch (err) {
                authMsg.textContent = "Błąd logowania: Niepoprawny e-mail lub hasło.";
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // --- SPRAWDZANIE STANU LOGOWANIA (AUTOMATYCZNE) ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Zalogowany -> pokaż formularz, ukryj logowanie
                authSection.classList.add('hidden');
                appSection.classList.remove('hidden');
                document.getElementById('user-email').textContent = user.email;
            } else {
                // Niezalogowany -> pokaż logowanie, ukryj formularz
                authSection.classList.remove('hidden');
                appSection.classList.add('hidden');
            }
        });

        // --- ZAPISYWANIE WYNIKU MECZU W FIRESTORE ---
        document.getElementById('btn-save').addEventListener('click', async () => {
            const p1 = document.getElementById('player1').value;
            const s1 = parseInt(document.getElementById('score1').value);
            const p2 = document.getElementById('player2').value;
            const s2 = parseInt(document.getElementById('score2').value);

            if(!p1 || !p2) {
                saveMsg.className = "error";
                saveMsg.textContent = "Wpisz nazwiska obu graczy!";
                return;
            }

            saveMsg.textContent = "Zapisywanie...";

            try {
                // Tworzymy wpis w kolekcji "matches"
                await addDoc(collection(db, "matches"), {
                    player1: p1,
                    score1: s1,
                    player2: p2,
                    score2: s2,
                    addedBy: auth.currentUser.email,
                    createdAt: serverTimestamp()
                });

                saveMsg.className = "success";
                saveMsg.textContent = "✔ Wynik zapisany pomyślnie!";
                
                // Czyszczenie pól po zapisie
                document.getElementById('player1').value = '';
                document.getElementById('player2').value = '';
                document.getElementById('score1').value = 0;
                document.getElementById('score2').value = 0;
            } catch (err) {
                saveMsg.className = "error";
                saveMsg.textContent = "Błąd zapisu: " + err.message;
            }
        });
    </script>
</body>
</html>
